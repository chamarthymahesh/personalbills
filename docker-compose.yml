version: "3.8"

services:
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "9000:80"
    restart: unless-stopped
    # Uncomment the following lines for development with live reload
    # volumes:
    #   - ./client:/app
    #   - /app/node_modules

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "9001:9001"
    restart: unless-stopped
    # Uncomment for development
    # volumes:
    #   - ./server:/app
    #   - /app/node_modules

networks:
  default:
    driver: bridge
